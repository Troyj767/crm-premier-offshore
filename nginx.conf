# ===========================================================================
# NGINX - Configuración de Producción
# Sistema CRM - Premier Offshore Solutions
# Servidor: Ubuntu 22.04 LTS
# ===========================================================================

# ── Bloque upstream: apunta al backend Django/Gunicorn ──────────────────────
upstream django_backend {
    server 127.0.0.1:8000;   # Gunicorn escucha aquí en la VM
    keepalive 32;
}

# ── Redirigir HTTP → HTTPS (opcional, activar cuando haya SSL) ──────────────
# server {
#     listen 80;
#     server_name tu-dominio.com;
#     return 301 https://$host$request_uri;
# }

# ── Servidor principal ───────────────────────────────────────────────────────
server {
    listen 80;                          # Puerto HTTP estándar
    server_name localhost 0.0.0.0;      # Cambia a tu IP o dominio real

    # Codificación y tamaño máximo de subidas (importaciones CSV)
    charset utf-8;
    client_max_body_size 20M;

    # ── Logs ─────────────────────────────────────────────────────────────────
    access_log /var/log/nginx/crm_access.log;
    error_log  /var/log/nginx/crm_error.log  warn;

    # ── Frontend Vue.js (archivos estáticos del build) ────────────────────────
    root /var/www/crm/frontend/dist;
    index index.html;

    # SPA fallback: toda ruta desconocida sirve index.html (Vue Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API REST → Django/Gunicorn ────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;

        proxy_set_header   Host              $http_host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 60s;
        proxy_read_timeout    120s;
        proxy_send_timeout    120s;
    }

    # ── Panel de administración Django ────────────────────────────────────────
    location /admin/ {
        proxy_pass         http://django_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host            $http_host;
        proxy_set_header   X-Real-IP       $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Archivos estáticos de Django (admin CSS/JS) ───────────────────────────
    location /static/ {
        alias /var/www/crm/backend/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ── Archivos de medios subidos por usuarios ───────────────────────────────
    location /media/ {
        alias /var/www/crm/backend/media/;
        expires 7d;
    }

    # ── Seguridad: bloquear archivos sensibles ────────────────────────────────
    location ~ /\.(env|git|htaccess) {
        deny all;
        return 404;
    }

    # ── Headers de seguridad HTTP ─────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"   always;
    add_header X-Content-Type-Options "nosniff"      always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # ── Compresión Gzip (mejora rendimiento - RNF-01) ─────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied    expired no-cache no-store private auth;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        image/svg+xml;
}
